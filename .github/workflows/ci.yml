name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: All Tests
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify package signatures
        run: npm audit signatures

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            pw-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Prettier Format Check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Svelte Check
        run: npm run svelte-check

      - name: Tests (unit + E2E)
        run: npm test

      - name: Compute artifact name
        if: failure()
        id: artifact_name
        run: |
          SAFE_REF=${GITHUB_REF_NAME//\//-}
          echo "value=test-artifacts-${SAFE_REF}" >> "$GITHUB_OUTPUT"

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact_name.outputs.value }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
